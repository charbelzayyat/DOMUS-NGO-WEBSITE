</head>

        <div class="container">

                <img src="images/logo.jpeg"

                DOMUS NGO

            </a>

            <button class="navbar-toggler"
                    data-bs-toggle="collapse"

                    aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                    <li class="nav-item">

                    <li class="nav-item">
                        <a class="nav-link active"
                           href="contact.html">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- HERO -->

    <section class="contact-hero">

        <div class="container text-center">

            <h1>Contact DOMUS</h1>

            <p>
                We would love to hear from you and welcome
                your support.
            </p>

        </div>

    </section>

    <!-- CONTACT INFO -->

    <section class="container py-5">

        <div class="row g-4">

            <div class="col-md-4">

                <div class="value-card">

                    <i class="fa-solid fa-phone fa-3x"></i>

                    <h4>Phone Numbers</h4>

                    <p><a href="tel:70970707">70 970 707</a>
                    </p>
                    <p><a href="tel:03382119">03 382 119</a>
                    </p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="value-card">

                    <i class="fa-solid fa-envelope fa-3x"></i>

                    <h4>Email</h4>

                    <p><a href="mailto:info@domuslb.com">info@domuslb.com</a></p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="value-card">

                    <i class="fa-solid fa-triangle-exclamation fa-3x"></i>

                    <h4>Emergency Contact</h4>

                    <p>Available 24/7</p>

                    <p>70 970 707</p>

                </div>

            </div>

        </div>

    </section>


    <!-- CONTACT FORM -->

    <section class="container py-5">

        <h2 class="text-center mb-5">
            Send Us a Message
        </h2>

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <form id="contactForm"
                      class="shadow p-4 rounded">

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input type="text"
                               id="name"
                               class="form-control"
                               required>

                        <small id="nameError"
                               class="text-danger"></small>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               id="email"
                               class="form-control"
                               required>

                        <small id="emailError"
                               class="text-danger"></small>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Phone Number
                        </label>

                        <input type="text"
                               id="phone"
                               class="form-control"
                               required>

                        <small id="phoneError"
                               class="text-danger"></small>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Message
                        </label>

                        <textarea id="message"
                                  rows="5"
                                  class="form-control"
                                  required></textarea>

                        <small id="messageError"
                               class="text-danger"></small>

                    </div>

                    <button class="btn btn-primary w-100">

                        Send Message

                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- GOOGLE MAP -->


<section class="container py-5">

    <h2 class="text-center mb-4">
        Find Us
    </h2>

    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6628.204044746468!2d35.52150506977539!3d33.83547949999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x151f182fab3ab9e7%3A0x3f1f051307b2d1b8!2sSt.%20Elias%20Church!5e0!3m2!1sen!2slb!4v1782493145852!5m2!1sen!2slb"
        width="100%"
        height="450"
        style="border:0;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin">
    </iframe>

</section>

        <p>© 2026 DOMUS NGO</p>

    </footer>

    <script src="js/validation.js"></script>

</body>

</html>
